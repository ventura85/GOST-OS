name: Build GOST OS ISO

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y live-build

    - name: Prepare live-build config
      run: |
        # Krok 1: Stwórz folder roboczy
        mkdir live-build-project
        cd live-build-project

        # Krok 2: Zainicjuj konfigurację live-build dla Debiana
        lb config \
        --distribution trixie \
        --architectures amd64 \
        --archive-areas "main contrib non-free non-free-firmware" \
        --mirror-bootstrap http://deb.debian.org/debian/ \
        --mirror-chroot http://deb.debian.org/debian/ \
        --mirror-chroot-security http://security.debian.org/debian-security/
        
        # Krok 3: Stwórz listę pakietów
        echo ">>> Creating package list..."
        cat > config/package-lists/gostos.list.chroot <<'EOF'
        git
        sudo
        xfce4
        xfce4-goodies
        menulibre
        mugshot
        xfce4-session-wayland
        librsvg2-bin
        gtk2-engines-murrine
        gtk2-engines-pixbuf
        xfce4-appfinder
        lightdm
        lightdm-gtk-greeter-settings
        live-boot
        live-config
        live-tools
        linux-image-amd64
        virtualbox-guest-utils
        virtualbox-guest-x11
        systemd-sysv
        EOF
        
        # Krok 4: Stwórz nakładkę z plikami projektu
        echo ">>> Copying project files..."
        # Kopiujemy pliki z repozytorium (które są w folderze nadrzędnym '../')
        # do struktury, której oczekuje nasz skrypt haka
        mkdir -p config/includes.chroot/opt/gostos-setup/GOST-OS
        cp -r ../* config/includes.chroot/opt/gostos-setup/GOST-OS
        
        # Krok 5: Stwórz skrypt 'hak'
        echo ">>> Creating hook script..."
        mkdir -p config/hooks/chroot
        cat > config/hooks/chroot/gostos-setup.hook.chroot <<'EOF'
        #!/bin/bash
        cd /opt/gostos-setup/GOST-OS/skrypty
        chmod +x *.sh
        chmod +x ../zasoby/WhiteSur-gtk-theme/install.sh
        chmod +x ../zasoby/Win10Sur-icon-theme/install.sh
        ./01-instalacja-pakietow.sh
        ./02-instalacja-motywow.sh
        ./03-kopiowanie-konfiguracji.sh
        rm -rf /opt/gostos-setup
        EOF
        chmod +x config/hooks/chroot/gostos-setup.hook.chroot

    - name: Run live-build
      run: |
        cd live-build-project
        sudo lb build 2>&1 | tee build.log

    - name: Upload ISO and Logs as artifact
      if: success() || failure() # Zawsze próbuj wysłać, nawet jak build się nie uda
      uses: actions/upload-artifact@v4
      with:
        name: gost-os-build-output
        path: |
          live-build-project/live-image-amd64.hybrid.iso
          live-build-project/build.log