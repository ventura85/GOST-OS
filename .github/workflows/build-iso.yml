name: Build GOST OS ISO

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y debootstrap squashfs-tools xorriso grub-pc-bin grub-efi-amd64-bin mtools

    - name: Create and Customize Debian Chroot
      run: |
        # Krok 1: Stwórz bazowy system Debian
        sudo debootstrap --arch=amd64 --variant=minbase trixie ../chroot http://deb.debian.org/debian/
        
        # Krok 2: Skopiuj pliki projektu do chroota
        sudo cp -r ${{ github.workspace }} ../chroot/gost-os-project
        
        # Krok 3: Wykonaj całą personalizację wewnątrz chroota
        sudo chroot ../chroot /bin/bash -c "
        set -e
        
        # --- INSTALACJA PAKIETÓW ---
        echo '>>> Instalowanie pakietów...'
        # Ustawienie poprawnego sources.list
        echo 'deb http://deb.debian.org/debian/ trixie main contrib non-free non-free-firmware' > /etc/apt/sources.list
        apt-get update
        
        # Instalacja wszystkich pakietów naraz
        apt-get install -y --no-install-recommends \
            git sudo xfce4 xfce4-goodies menulibre mugshot xfce4-session-wayland \
            librsvg2-bin gtk2-engines-murrine gtk2-engines-pixbuf xfce4-appfinder \
            lightdm lightdm-gtk-greeter-settings live-boot live-config live-tools \
            linux-image-amd64 virtualbox-guest-utils virtualbox-guest-x11 systemd-sysv

        # --- INSTALACJA MOTYWÓW ---
        echo '>>> Instalowanie motywów...'
        cd /gost-os-project
        
        # Poprawiamy skrypty instalacyjne motywów, usuwając z nich 'sudo'
        sed -i 's/sudo //g' zasoby/WhiteSur-gtk-theme/install.sh
        
        # Nadajemy uprawnienia i instalujemy
        chmod +x zasoby/WhiteSur-gtk-theme/install.sh
        chmod +x zasoby/Win10Sur-icon-theme/install.sh
        ./zasoby/WhiteSur-gtk-theme/install.sh -t green -l
        ./zasoby/Win10Sur-icon-theme/install.sh -a

        # --- KOPIOWANIE KONFIGURACJI ---
        echo '>>> Kopiowanie plików konfiguracyjnych...'
        USER_HOME='/home/user' # W systemie live domyślny użytkownik to 'user'
        
        # Kopiowanie grafiki systemowej
        mkdir -p /usr/share/backgrounds/gostos
        cp zasoby/branding/wallpaper_gostos.jpg /usr/share/images/desktop-base/
        cp zasoby/branding/login-background.png /usr/share/backgrounds/gostos/
        cp zasoby/branding/avatar.png /usr/share/backgrounds/gostos/
        cp zasoby/branding/gostos-start.png /usr/share/pixmaps/

        # Kopiowanie konfiguracji użytkownika
        mkdir -p \$USER_HOME/.config \$USER_HOME/Pulpit
        cp -r konfiguracja/pulpit/* \$USER_HOME/.config/xfce4/xfconf/xfce-perchannel-xml/
        cp -r konfiguracja/panel/* \$USER_HOME/.config/xfce4/xfconf/xfce-perchannel-xml/
        mkdir -p \$USER_HOME/.config/menus \$USER_HOME/.local/share/applications
        cp konfiguracja/menu/xfce-applications.menu \$USER_HOME/.config/menus/
        cp -r konfiguracja/menu/custom-applications/* \$USER_HOME/.local/share/applications/
        mkdir -p \$USER_HOME/.config/gtk-3.0
        cp konfiguracja/motywy/gtk.css \$USER_HOME/.config/gtk-3.0/
        cp konfiguracja/motywy/.gtkrc-2.0 \$USER_HOME/
        cp -r konfiguracja/pulpit/skroty/* \$USER_HOME/Pulpit
        chmod +x \$USER_HOME/Pulpit/*.desktop
        
        # Konfiguracja LightDM
        cp konfiguracja/logowanie/lightdm-gtk-greeter.conf /etc/lightdm/
        
        # Ustawianie awatara i naprawa uprawnień
        cp /usr/share/backgrounds/gostos/avatar.png \$USER_HOME/.face
        chown -R 1000:1000 \$USER_HOME
        
        # Czyszczenie
        rm -rf /gost-os-project
        apt-get clean
        "

    - name: Create ISO Image
      run: |
        mkdir -p image/live image/boot/grub
        sudo mksquashfs ../chroot image/live/filesystem.squashfs -comp xz -e boot
        sudo cp ../chroot/boot/vmlinuz-* image/live/vmlinuz
        sudo cp ../chroot/boot/initrd.img-* image/live/initrd.img
        cat > image/boot/grub/grub.cfg <<'EOF'
        set timeout=5
        set default="0"
        menuentry "Start GOST OS Live" {
            linux /live/vmlinuz boot=live
            initrd /live/initrd.img
        }
        EOF
        sudo grub-mkrescue -o gost-os.iso image
        
    - name: Upload ISO as artifact
      uses: actions/upload-artifact@v4
      with:
        name: gost-os-iso
        path: gost-os.iso