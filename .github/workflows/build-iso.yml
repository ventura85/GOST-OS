name: Build GOST OS ISO

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y live-build

    - name: Prepare live-build config
      run: |
        # Tworzymy folder roboczy OBOK folderu z kodem, aby uniknąć błędu kopiowania
        mkdir ../live-build-project
        cd ../live-build-project

        # Inicjalizujemy konfigurację
        lb config \
        --distribution trixie \
        --architectures amd64 \
        --archive-areas "main contrib non-free non-free-firmware"
        
        # BRUTALNA POPRAWKA: Tworzymy własny, idealny plik sources.list,
        # aby zmusić live-build do używania tylko serwerów Debiana.
        mkdir -p config/archives
        cat > config/archives/gostos.list.chroot <<'EOF'
        deb http://deb.debian.org/debian/ trixie main contrib non-free non-free-firmware
        deb http://security.debian.org/debian-security trixie-security main contrib non-free non-free-firmware
        deb http://deb.debian.org/debian/ trixie-updates main contrib non-free non-free-firmware
        EOF
        
        # Tworzymy listę pakietów (zawiera wszystkie nasze poprawki)
        cat > config/package-lists/gostos.list.chroot <<'EOF'
        git
        sudo
        xfce4
        xfce4-goodies
        menulibre
        mugshot
        xfce4-session-wayland
        librsvg2-bin
        gtk2-engines-murrine
        gtk2-engines-pixbuf
        xfce4-appfinder
        lightdm
        lightdm-gtk-greeter-settings
        live-boot
        live-config
        live-tools
        linux-image-amd64
        virtualbox-guest-utils
        virtualbox-guest-x11
        systemd-sysv
        EOF
        
        # Kopiujemy pliki projektu (z folderu ${{ github.workspace }}) do nakładki
        mkdir -p config/includes.chroot/opt/gostos-setup/GOST-OS
        cp -r ${{ github.workspace }}/* config/includes.chroot/opt/gostos-setup/GOST-OS
        
        # Tworzymy skrypt 'hak'
        mkdir -p config/hooks/chroot
        cat > config/hooks/chroot/gostos-setup.hook.chroot <<'EOF'
        #!/bin/bash
        cd /opt/gostos-setup/GOST-OS/skrypty
        ./01-instalacja-pakietow.sh
        ./02-instalacja-motywow.sh
        ./03-kopiowanie-konfiguracji.sh
        rm -rf /opt/gostos-setup
        EOF
        chmod +x config/hooks/chroot/gostos-setup.hook.chroot

    - name: Run live-build
      run: |
        cd ../live-build-project
        sudo lb build 2>&1 | tee build.log

    - name: Upload ISO and Logs as artifact
      if: success() || failure()
      uses: actions/upload-artifact@v4
      with:
        name: gost-os-build-output
        # Ścieżka jest teraz poprawna względem głównego folderu roboczego
        path: |
          live-build-project/live-image-amd64.hybrid.iso
          live-build-project/build.log