name: Build GOST OS ISO

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y debootstrap squashfs-tools xorriso grub-pc-bin grub-efi-amd64-bin mtools

    - name: Create Debian Chroot Environment
      run: |
        sudo debootstrap --arch=amd64 --variant=minbase trixie ../chroot http://deb.debian.org/debian/
    
    - name: Customize Chroot Environment
      run: |
        sudo cp -r ${{ github.workspace }} ../chroot/gost-os-project
        
        # JEDNA, KOMPLETNA LISTA WSZYSTKICH POTRZEBNYCH PAKIETÓW
        PACKAGES=$(cat <<'EOF'
        git sudo xfce4 xfce4-goodies menulibre mugshot xfce4-session-wayland 
        librsvg2-bin gtk2-engines-murrine gtk2-engines-pixbuf xfce4-appfinder 
        lightdm lightdm-gtk-greeter-settings live-boot live-config live-tools 
        linux-image-amd64 virtualbox-guest-utils virtualbox-guest-x11 systemd-sysv
        EOF
        )

        sudo chroot ../chroot /bin/bash -c "
        set -e
        echo 'deb http://deb.debian.org/debian/ trixie main contrib non-free non-free-firmware' > /etc/apt/sources.list
        apt-get update
        apt-get install -y --no-install-recommends \$PACKAGES

        # Uruchamiamy TYLKO skrypty konfiguracyjne (02 i 03)
        cd /gost-os-project/skrypty
        ./02-instalacja-motywow.sh
        ./03-kopiowanie-konfiguracji.sh
        
        # Czyścimy po sobie
        rm -rf /gost-os-project
        apt-get clean
        "

    - name: Create ISO Image
      run: |
        mkdir -p image/live
        mkdir -p image/boot/grub
        sudo mksquashfs ../chroot image/live/filesystem.squashfs -comp xz -e boot
        sudo cp ../chroot/boot/vmlinuz-* image/live/vmlinuz
        sudo cp ../chroot/boot/initrd.img-* image/live/initrd.img
        
        cat > image/boot/grub/grub.cfg <<'EOF'
        set timeout=5
        set default="0"
        menuentry "Start GOST OS Live" {
            linux /live/vmlinuz boot=live
            initrd /live/initrd.img
        }
        EOF

        sudo grub-mkrescue -o gost-os.iso image
        
    - name: Upload ISO as artifact
      uses: actions/upload-artifact@v4
      with:
        name: gost-os-iso
        path: gost-os.iso