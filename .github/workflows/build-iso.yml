name: Build and Test GOST OS ISO

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential debhelper dh-make

      - name: Build the theme .deb package
        run: |
          cd gost-theme-package/
          dpkg-buildpackage -us -uc
          
      - name: Upload .deb package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: gost-theme-deb
          path: ./*.deb

  build-iso:
    needs: build-package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download .deb package artifact
        uses: actions/download-artifact@v4
        with:
          name: gost-theme-deb
          path: config/packages/

      - name: Build Debian Live ISO in Docker Container
        run: |
          chmod +x build-iso.sh
          docker run --rm --privileged \
            -v "${{ github.workspace }}":/build \
            -w /build \
            debian:trixie-slim \
            ./build-iso.sh
                  
      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v4
        with:
          name: GOSTOS-debian-trixie-live.iso
          path: live-image-amd64.hybrid.iso