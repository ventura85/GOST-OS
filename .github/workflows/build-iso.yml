name: Build GOST OS ISO

on:
  push:
    branches: [ "main", "finalna-konfiguracja" ]
  workflow_dispatch:

jobs:
  # --- ZADANIE 1: Budowanie pakietu .deb z motywem (bez zmian) ---
  build-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential debhelper dh-make sassc

      - name: Build the theme .deb package
        run: |
          cd gost-theme-package/
          dpkg-buildpackage -us -uc
          
      - name: Upload .deb package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: gost-theme-deb
          path: ./*.deb

  # --- ZADANIE 2: Budowanie obrazu ISO (poprawiona wersja) ---
  build-iso:
    needs: build-package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download .deb package artifact
        uses: actions/download-artifact@v4
        with:
          name: gost-theme-deb
          path: config/packages.chroot/

      - name: Build Debian Live ISO in Docker Container
        run: |
          # Wszystkie komendy wykonujemy teraz bezpośrednio tutaj, bez użycia build-iso.sh
          docker run --rm --privileged \
            -v "${{ github.workspace }}":/build \
            -w /build \
            debian:trixie-slim \
            sh -c "apt-get update && apt-get install -y live-build && lb config && lb build"
                  
      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v4
        with:
          name: GOSTOS-debian-trixie-live.iso
          path: live-image-amd64.hybrid.iso